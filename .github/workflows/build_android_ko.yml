# CTF|认证
name: Build Delta Android KO

on:
  workflow_dispatch:
    inputs:
      manifest_branch:
        description: Dynamic manifest branch
        default: oneplus/sm8750
        required: true
      manifest_file:
        description: Device manifest
        default: oneplus_ace_6.xml
        required: true
      page_size:
        description: Kernel page size (device getconf PAGESIZE = 4096)
        type: choice
        options: ['4k', '16k']
        default: '4k'
        required: true

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 480
    steps:
      - name: Maximize runner disk
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 4096
          swap-size-mb: 2048
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: Checkout module project
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex git jq \
            libelf-dev libssl-dev lld llvm make python3 rsync unzip zip zstd
          curl -fsSL https://storage.googleapis.com/git-repo-downloads/repo -o /tmp/repo
          sudo install -m 0755 /tmp/repo /usr/local/bin/repo

      - name: Sync exact OnePlus Ace 6 source manifest
        run: |
          mkdir -p kernel_workspace
          cd kernel_workspace
          repo init -u https://github.com/Numbersf/kernel_manifest.git \
            -b '${{ inputs.manifest_branch }}' \
            -m '${{ inputs.manifest_file }}' \
            --depth=1 --no-clone-bundle --no-tags
          repo sync -c -j"$(nproc)" --force-sync --no-clone-bundle --no-tags

      - name: Select exact page-size target
        shell: bash
        run: |
          set -euo pipefail
          cd kernel_workspace
          SCRIPT=kernel_platform/build_with_bazel.py
          test -f "$SCRIPT"
          python3 - "${{ inputs.page_size }}" "$SCRIPT" <<'PY'
          from pathlib import Path
          import sys
          page, filename = sys.argv[1:]
          p = Path(filename)
          text = p.read_text()
          old = '{}[^-]*_{}.*_dist$'
          if page == '4k':
              new = '^//msm-kernel:{}_{}_dist$'
          else:
              new = '^//msm-kernel:{}16k_{}_dist$'
          if old not in text:
              raise SystemExit('build target query pattern changed upstream')
          p.write_text(text.replace(old, new, 1))
          PY
          echo "Selected page size: ${{ inputs.page_size }}"
          grep -n 'query =.*_dist' "$SCRIPT" | head

      - name: Inject delta module into selected kernel target
        shell: bash
        run: |
          set -euo pipefail
          ROOT="$GITHUB_WORKSPACE/kernel_workspace/kernel_platform/msm-kernel"
          MOD="$ROOT/drivers/misc/delta_kernel"
          mkdir -p "$MOD"
          cp "$GITHUB_WORKSPACE/kernel_module/delta_kernel.c" "$MOD/delta_kernel.c"
          cp "$GITHUB_WORKSPACE/shared/delta_protocol.h" "$MOD/delta_protocol.h"
          sed -i 's#"../shared/delta_protocol.h"#"delta_protocol.h"#' "$MOD/delta_kernel.c"
          printf 'obj-m += delta_kernel.o\n' > "$MOD/Makefile"
          grep -q '^obj-m += delta_kernel/$' "$ROOT/drivers/misc/Makefile" || printf '\nobj-m += delta_kernel/\n' >> "$ROOT/drivers/misc/Makefile"
          python3 - "$ROOT/sun.bzl" <<'PY'
          from pathlib import Path
          import sys
          p=Path(sys.argv[1]); text=p.read_text()
          needle='    _sun_in_tree_modules = [\n'
          entry='        "drivers/misc/delta_kernel/delta_kernel.ko",\n'
          if needle not in text: raise SystemExit('sun module list not found')
          if entry not in text: text=text.replace(needle,needle+entry,1)
          p.write_text(text)
          PY
          grep -n 'delta_kernel' "$ROOT/sun.bzl" "$ROOT/drivers/misc/Makefile" "$MOD/Makefile"

      - name: Restore Bazel kernel cache
        uses: actions/cache@v4
        with:
          path: kernel_workspace/bazel-cache
          key: kernel-bazel-${{ runner.os }}-sm8750-${{ inputs.manifest_branch }}-${{ inputs.manifest_file }}-${{ inputs.page_size }}-${{ hashFiles('kernel_module/**', 'shared/**') }}
          restore-keys: |
            kernel-bazel-${{ runner.os }}-sm8750-${{ inputs.manifest_branch }}-${{ inputs.manifest_file }}-${{ inputs.page_size }}-
            kernel-bazel-${{ runner.os }}-sm8750-${{ inputs.manifest_branch }}-${{ inputs.manifest_file }}-

      - name: Build device kernel output
        run: |
          set -euo pipefail
          cd kernel_workspace
          (while true; do echo "===== runner resources $(date -Iseconds) ====="; free -h; df -h "$GITHUB_WORKSPACE"; sleep 300; done) &
          MONITOR_PID=$!
          trap 'kill "$MONITOR_PID" 2>/dev/null || true' EXIT
          LTO=thin SYSTEM_DLKM_RE_SIGN=0 BUILD_SYSTEM_DLKM=0 \
            KMI_SYMBOL_LIST_STRICT_MODE=0 \
            ./kernel_platform/oplus/build/oplus_build_kernel.sh sun perf
          DIST="$GITHUB_WORKSPACE/kernel_workspace/kernel_platform/out/msm-kernel-sun-perf/dist"
          test -f "$DIST/Module.symvers"
          test -f "$DIST/.config"
          test -f "$DIST/delta_kernel.ko"

      - name: Locate prepared kernel output
        id: kernel_out
        shell: bash
        run: |
          set -euo pipefail
          COMMON="$GITHUB_WORKSPACE/kernel_workspace/kernel_platform/common"
          DIST="$GITHUB_WORKSPACE/kernel_workspace/kernel_platform/out/msm-kernel-sun-perf/dist"
          SYMVERS="$DIST/Module.symvers"
          CONFIG="$DIST/.config"
          OUT="$DIST"
          test -f "$SYMVERS"
          test -f "$CONFIG"
          test -f "$DIST/delta_kernel.ko"
          echo "common=$COMMON" >> "$GITHUB_OUTPUT"
          echo "out=$OUT" >> "$GITHUB_OUTPUT"
          echo "symvers=$SYMVERS" >> "$GITHUB_OUTPUT"
          echo "Kernel output: $OUT"
          grep -E 'CONFIG_(MODULES|MODVERSIONS|MODULE_SIG|ARM64_4K_PAGES|ARM64_16K_PAGES)=' "$CONFIG" || true
          if [[ '${{ inputs.page_size }}' == '4k' ]]; then grep -q '^CONFIG_ARM64_4K_PAGES=y' "$CONFIG"; else grep -q '^CONFIG_ARM64_16K_PAGES=y' "$CONFIG"; fi

      - name: Verify in-tree delta module
        shell: bash
        run: |
          set -euo pipefail
          KO='${{ steps.kernel_out.outputs.out }}/delta_kernel.ko'
          test -f "$KO"
          modinfo "$KO"

      - name: Package ABI evidence and KO
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp '${{ steps.kernel_out.outputs.out }}/delta_kernel.ko' dist/
          cp '${{ steps.kernel_out.outputs.out }}/.config' dist/kernel.config
          cp '${{ steps.kernel_out.outputs.symvers }}' dist/Module.symvers
          KERNEL_IMAGE=$(find kernel_workspace/kernel_platform -type f -name Image -path '*/out/*' | head -n 1 || true)
          if [[ -n "$KERNEL_IMAGE" ]]; then cp "$KERNEL_IMAGE" dist/reference_Image; fi
          modinfo dist/delta_kernel.ko | tee dist/modinfo.txt
          sha256sum dist/* | tee dist/SHA256SUMS

      - name: Upload delta KO package
        uses: actions/upload-artifact@v4
        with:
          name: delta_kernel_oneplus_ace_6
          path: dist/*
          if-no-files-found: error




